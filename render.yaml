services:
  - type: web
    name: kreata-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
        sync: false
      - key: SECRET_KEY
        scope: runtime
        sync: false
      - key: ADMIN_USERNAME
        value: admin
        scope: runtime
      - key: ADMIN_PASSWORD
        scope: runtime
        sync: false
      - key: ADMIN_EMAIL
        value: admin@kreatadesigns.com
        scope: runtime
      - key: CLOUDINARY_CLOUD_NAME
        scope: runtime
        sync: false
      - key: CLOUDINARY_API_KEY
        scope: runtime
        sync: false
      - key: CLOUDINARY_API_SECRET
        scope: runtime
        sync: false
      - key: FRONTEND_URL
        value: https://kreata-frontend.onrender.com
        scope: runtime
    healthCheckPath: /api/health